# Prometheus Alert Rules for tx-agent-kit
# Basic alerting rules for local development
#
# Available application metrics (from metrics-registry.ts):
#   tx_agent_kit_client_http_request_total      — HTTP client request counter
#   tx_agent_kit_client_http_request_duration    — HTTP client request duration histogram
#   tx_agent_kit_node_service_startup_total      — service startup counter
#
# Scrape targets (from prometheus.yml):
#   prometheus, node, otel-collector

groups:
  - name: tx-agent-kit-api
    rules:
      # High client-side HTTP error rate
      - alert: HighClientErrorRate
        expr: |
          sum(rate(tx_agent_kit_client_http_request_total{status_code=~"5.."}[5m]))
          / sum(rate(tx_agent_kit_client_http_request_total[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'High client-side HTTP error rate'
          description: 'Outgoing HTTP client error rate is above 5% for the last 2 minutes.'

  - name: infrastructure
    rules:
      # OTel Collector is down
      - alert: OTelCollectorDown
        expr: up{job="otel-collector"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'OTel Collector is down'
          description: 'The OpenTelemetry Collector has been down for more than 1 minute.'

      # Node exporter down
      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'Node Exporter is down'
          description: 'Node Exporter has been down for more than 2 minutes.'

      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High memory usage detected'
          description: 'Memory usage is above 90% for the last 5 minutes.'

      # High CPU usage
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High CPU usage detected'
          description: 'CPU usage is above 90% for the last 5 minutes.'

      # Disk space low
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Low disk space'
          description: 'Less than 10% disk space remaining.'
