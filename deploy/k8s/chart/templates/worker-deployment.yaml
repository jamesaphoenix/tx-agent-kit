apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tx-agent-kit.fullname" . }}-worker
  labels:
    {{- include "tx-agent-kit.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "tx-agent-kit.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      annotations:
        checksum/runtime-secret: {{ include (print $.Template.BasePath "/runtime-secret.yaml") . | sha256sum }}
      labels:
        {{- include "tx-agent-kit.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: {{ required "images.worker must be set" .Values.images.worker | quote }}
          imagePullPolicy: {{ .Values.images.pullPolicy | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: {{ include "tx-agent-kit.runtimeSecretName" . }}
          startupProbe:
            exec:
              command: ["sh", "-c", "kill -0 1"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["sh", "-c", "kill -0 1"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "kill -0 1"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
