name: Release Kubernetes

on:
  workflow_dispatch:
    inputs:
      build_strategy:
        description: Image build strategy
        required: true
        default: google_cloud
        type: choice
        options:
          - locally
          - google_cloud
      deploy_env:
        description: Mac k3s environments to deploy
        required: true
        default: staging
        type: choice
        options:
          - none
          - staging
          - prod
          - both
      deploy_gke:
        description: Deploy to GKE and run OTEL + setup/teardown validation
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-k8s-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  guard_trusted_ref:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ensure deploy workflow runs only from main
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Deploy workflow is restricted to refs/heads/main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

  build_images_locally:
    if: ${{ needs.guard_trusted_ref.result == 'success' && github.event.inputs.build_strategy == 'locally' }}
    needs: [guard_trusted_ref]
    runs-on: [self-hosted, mac-studio]
    timeout-minutes: 45
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ARTIFACT_REGISTRY_REGION: ${{ secrets.ARTIFACT_REGISTRY_REGION }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}
    outputs:
      artifact_name: ${{ steps.artifact.outputs.name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6
        with:
          node-version: 22
      - uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1
      - name: Configure Artifact Registry auth
        run: |
          set -euo pipefail
          if ! command -v gcloud >/dev/null 2>&1; then
            echo "gcloud is required for Artifact Registry auth"
            exit 1
          fi
          gcloud auth configure-docker "${ARTIFACT_REGISTRY_REGION}-docker.pkg.dev" --quiet
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and push images
        run: PUSH_IMAGES=1 pnpm deploy:build-images
      - name: Resolve artifact file
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact_file="$(ls -t deploy/artifacts/images-*.env | head -n 1)"
          artifact_name="$(basename "$artifact_file")"
          echo "name=$artifact_name" >> "$GITHUB_OUTPUT"
      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: deploy/artifacts/${{ steps.artifact.outputs.name }}
          if-no-files-found: error

  build_images_google_cloud:
    if: ${{ needs.guard_trusted_ref.result == 'success' && github.event.inputs.build_strategy == 'google_cloud' }}
    needs: [guard_trusted_ref]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    outputs:
      artifact_name: ${{ steps.artifact.outputs.name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6
        with:
          node-version: 22
      - uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f
      - name: Configure Artifact Registry auth
        env:
          ARTIFACT_REGISTRY_REGION: ${{ secrets.ARTIFACT_REGISTRY_REGION }}
        run: gcloud auth configure-docker "${ARTIFACT_REGISTRY_REGION}-docker.pkg.dev" --quiet
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and push images
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REGISTRY_REGION: ${{ secrets.ARTIFACT_REGISTRY_REGION }}
          ARTIFACT_REGISTRY_REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}
        run: PUSH_IMAGES=1 pnpm deploy:build-images
      - name: Resolve artifact file
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact_file="$(ls -t deploy/artifacts/images-*.env | head -n 1)"
          artifact_name="$(basename "$artifact_file")"
          echo "name=$artifact_name" >> "$GITHUB_OUTPUT"
      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: deploy/artifacts/${{ steps.artifact.outputs.name }}
          if-no-files-found: error

  deploy_k3s_staging:
    if: ${{ always() && needs.guard_trusted_ref.result == 'success' && (github.event.inputs.deploy_env == 'staging' || github.event.inputs.deploy_env == 'both') && (needs.build_images_locally.result == 'success' || needs.build_images_google_cloud.result == 'success') }}
    runs-on: [self-hosted, mac-studio]
    timeout-minutes: 60
    concurrency:
      group: k8s-mac-staging
      cancel-in-progress: false
    needs:
      - guard_trusted_ref
      - build_images_locally
      - build_images_google_cloud
    environment: mac-k3s-staging
    permissions:
      contents: read
      id-token: write
    env:
      K8S_CONTEXT_MAC: ${{ vars.K8S_CONTEXT_MAC }}
      K8S_NAMESPACE_MAC_STAGING: ${{ vars.K8S_NAMESPACE_MAC_STAGING }}
      HELM_RELEASE_MAC_STAGING: ${{ vars.HELM_RELEASE_MAC_STAGING }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ARTIFACT_REGISTRY_REGION: ${{ secrets.ARTIFACT_REGISTRY_REGION }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}
      CLOUDFLARE_TUNNEL_UPSTREAM_STAGING: ${{ vars.CLOUDFLARE_TUNNEL_UPSTREAM_STAGING }}
      CLOUDFLARED_RESTART_COMMAND: ${{ vars.CLOUDFLARED_RESTART_COMMAND }}
      RUN_TUNNEL_CHECK_SOFT_FAIL: '0'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6
        with:
          node-version: 22
      - uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1
      - name: Verify 1Password CLI access
        shell: bash
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          if ! command -v op >/dev/null 2>&1; then
            echo "1Password CLI (op) is required on the Mac runner."
            exit 1
          fi
          if [[ -n "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]]; then
            echo "Using OP_SERVICE_ACCOUNT_TOKEN for non-interactive 1Password access."
            exit 0
          fi
          if ! op whoami >/dev/null 2>&1; then
            echo "1Password CLI is not signed in and OP_SERVICE_ACCOUNT_TOKEN is not set."
            exit 1
          fi
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f
      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker "${ARTIFACT_REGISTRY_REGION}-docker.pkg.dev" --quiet
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Resolve artifact name
        id: artifact
        shell: bash
        env:
          LOCAL_ARTIFACT: ${{ needs.build_images_locally.outputs.artifact_name }}
          CLOUD_ARTIFACT: ${{ needs.build_images_google_cloud.outputs.artifact_name }}
        run: |
          set -euo pipefail
          artifact_name="${LOCAL_ARTIFACT:-$CLOUD_ARTIFACT}"
          if [[ -z "$artifact_name" ]]; then
            echo "Unable to resolve artifact name from build jobs"
            exit 1
          fi
          echo "name=$artifact_name" >> "$GITHUB_OUTPUT"
      - name: Download image artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: deploy/artifacts
      - name: Validate artifact
        run: ./scripts/deploy/ci/verify-artifact.sh "deploy/artifacts/${{ steps.artifact.outputs.name }}"
      - name: Prepare Cloudflare tunnel credentials file
        id: cloudflare_creds
        shell: bash
        env:
          CLOUDFLARE_TUNNEL_CREDENTIALS_FILE: ${{ secrets.CLOUDFLARE_TUNNEL_CREDENTIALS_FILE }}
        run: |
          set -euo pipefail
          candidate="${CLOUDFLARE_TUNNEL_CREDENTIALS_FILE:-}"
          if [[ -z "$candidate" ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -f "$candidate" ]]; then
            echo "path=$candidate" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/cloudflared"
          credentials_path="$RUNNER_TEMP/cloudflared/credentials.json"
          printf '%s' "$candidate" > "$credentials_path"
          chmod 600 "$credentials_path"
          echo "path=$credentials_path" >> "$GITHUB_OUTPUT"
      - name: Deploy staging to k3s
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
          CLOUDFLARE_TUNNEL_HOST_STAGING: ${{ secrets.CLOUDFLARE_TUNNEL_HOST_STAGING }}
          CLOUDFLARE_TUNNEL_CREDENTIALS_FILE: ${{ steps.cloudflare_creds.outputs.path != '' && steps.cloudflare_creds.outputs.path || env.CLOUDFLARE_TUNNEL_CREDENTIALS_FILE }}
          TUNNEL_RECONCILE_MODE: staging
          TUNNEL_CHECK_MODE: staging
        run: pnpm deploy:k8s:mac:staging "deploy/artifacts/${{ steps.artifact.outputs.name }}"
      - name: Cleanup Cloudflare credentials
        if: ${{ always() && steps.cloudflare_creds.outputs.path != '' && startsWith(steps.cloudflare_creds.outputs.path, runner.temp) }}
        shell: bash
        env:
          CREDS_PATH: ${{ steps.cloudflare_creds.outputs.path }}
        run: rm -f "$CREDS_PATH"

  deploy_k3s_prod:
    if: ${{ always() && needs.guard_trusted_ref.result == 'success' && (github.event.inputs.deploy_env == 'prod' || github.event.inputs.deploy_env == 'both') && (needs.build_images_locally.result == 'success' || needs.build_images_google_cloud.result == 'success') && (github.event.inputs.deploy_env != 'both' || needs.deploy_k3s_staging.result == 'success') }}
    runs-on: [self-hosted, mac-studio]
    timeout-minutes: 60
    concurrency:
      group: k8s-mac-prod
      cancel-in-progress: false
    needs:
      - guard_trusted_ref
      - build_images_locally
      - build_images_google_cloud
      - deploy_k3s_staging
    environment: mac-k3s-prod
    permissions:
      contents: read
      id-token: write
    env:
      K8S_CONTEXT_MAC: ${{ vars.K8S_CONTEXT_MAC }}
      K8S_NAMESPACE_MAC_PROD: ${{ vars.K8S_NAMESPACE_MAC_PROD }}
      HELM_RELEASE_MAC_PROD: ${{ vars.HELM_RELEASE_MAC_PROD }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ARTIFACT_REGISTRY_REGION: ${{ secrets.ARTIFACT_REGISTRY_REGION }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}
      CLOUDFLARE_TUNNEL_UPSTREAM_PROD: ${{ vars.CLOUDFLARE_TUNNEL_UPSTREAM_PROD }}
      CLOUDFLARED_RESTART_COMMAND: ${{ vars.CLOUDFLARED_RESTART_COMMAND }}
      RUN_TUNNEL_CHECK_SOFT_FAIL: '0'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6
        with:
          node-version: 22
      - uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1
      - name: Verify 1Password CLI access
        shell: bash
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          if ! command -v op >/dev/null 2>&1; then
            echo "1Password CLI (op) is required on the Mac runner."
            exit 1
          fi
          if [[ -n "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]]; then
            echo "Using OP_SERVICE_ACCOUNT_TOKEN for non-interactive 1Password access."
            exit 0
          fi
          if ! op whoami >/dev/null 2>&1; then
            echo "1Password CLI is not signed in and OP_SERVICE_ACCOUNT_TOKEN is not set."
            exit 1
          fi
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f
      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker "${ARTIFACT_REGISTRY_REGION}-docker.pkg.dev" --quiet
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Resolve artifact name
        id: artifact
        shell: bash
        env:
          LOCAL_ARTIFACT: ${{ needs.build_images_locally.outputs.artifact_name }}
          CLOUD_ARTIFACT: ${{ needs.build_images_google_cloud.outputs.artifact_name }}
        run: |
          set -euo pipefail
          artifact_name="${LOCAL_ARTIFACT:-$CLOUD_ARTIFACT}"
          if [[ -z "$artifact_name" ]]; then
            echo "Unable to resolve artifact name from build jobs"
            exit 1
          fi
          echo "name=$artifact_name" >> "$GITHUB_OUTPUT"
      - name: Download image artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: deploy/artifacts
      - name: Validate artifact
        run: ./scripts/deploy/ci/verify-artifact.sh "deploy/artifacts/${{ steps.artifact.outputs.name }}"
      - name: Prepare Cloudflare tunnel credentials file
        id: cloudflare_creds
        shell: bash
        env:
          CLOUDFLARE_TUNNEL_CREDENTIALS_FILE: ${{ secrets.CLOUDFLARE_TUNNEL_CREDENTIALS_FILE }}
        run: |
          set -euo pipefail
          candidate="${CLOUDFLARE_TUNNEL_CREDENTIALS_FILE:-}"
          if [[ -z "$candidate" ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -f "$candidate" ]]; then
            echo "path=$candidate" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/cloudflared"
          credentials_path="$RUNNER_TEMP/cloudflared/credentials.json"
          printf '%s' "$candidate" > "$credentials_path"
          chmod 600 "$credentials_path"
          echo "path=$credentials_path" >> "$GITHUB_OUTPUT"
      - name: Deploy prod to k3s
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
          CLOUDFLARE_TUNNEL_HOST_PROD: ${{ secrets.CLOUDFLARE_TUNNEL_HOST_PROD }}
          CLOUDFLARE_TUNNEL_CREDENTIALS_FILE: ${{ steps.cloudflare_creds.outputs.path != '' && steps.cloudflare_creds.outputs.path || env.CLOUDFLARE_TUNNEL_CREDENTIALS_FILE }}
          TUNNEL_RECONCILE_MODE: prod
          TUNNEL_CHECK_MODE: prod
        run: pnpm deploy:k8s:mac:prod "deploy/artifacts/${{ steps.artifact.outputs.name }}"
      - name: Cleanup Cloudflare credentials
        if: ${{ always() && steps.cloudflare_creds.outputs.path != '' && startsWith(steps.cloudflare_creds.outputs.path, runner.temp) }}
        shell: bash
        env:
          CREDS_PATH: ${{ steps.cloudflare_creds.outputs.path }}
        run: rm -f "$CREDS_PATH"

  deploy_gke:
    if: ${{ always() && needs.guard_trusted_ref.result == 'success' && github.event.inputs.deploy_gke == 'true' && (github.event.inputs.deploy_env == 'staging' || github.event.inputs.deploy_env == 'prod') && (needs.build_images_locally.result == 'success' || needs.build_images_google_cloud.result == 'success') && (needs.deploy_k3s_staging.result == 'success' || needs.deploy_k3s_staging.result == 'skipped') && (needs.deploy_k3s_prod.result == 'success' || needs.deploy_k3s_prod.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: k8s-gke
      cancel-in-progress: false
    needs:
      - guard_trusted_ref
      - build_images_locally
      - build_images_google_cloud
      - deploy_k3s_staging
      - deploy_k3s_prod
    environment: gke-loadtest
    permissions:
      contents: read
      id-token: write
    env:
      K8S_NAMESPACE_GKE_STAGING: ${{ vars.K8S_NAMESPACE_GKE_STAGING }}
      HELM_RELEASE_GKE_STAGING: ${{ vars.HELM_RELEASE_GKE_STAGING }}
      K8S_NAMESPACE_GKE_PROD: ${{ vars.K8S_NAMESPACE_GKE_PROD }}
      HELM_RELEASE_GKE_PROD: ${{ vars.HELM_RELEASE_GKE_PROD }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ARTIFACT_REGISTRY_REGION: ${{ secrets.ARTIFACT_REGISTRY_REGION }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}
      GCP_BILLING_ACCOUNT_ID: ${{ secrets.GCP_BILLING_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6
        with:
          node-version: 22
      - uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1
      - name: Install 1Password CLI
        uses: 1password/install-cli-action@9b82e19ce89f957763220d632ec1de246084f78a
      - name: Verify 1Password CLI access
        shell: bash
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]]; then
            echo "Using OP_SERVICE_ACCOUNT_TOKEN for non-interactive 1Password access."
            exit 0
          fi
          if ! op whoami >/dev/null 2>&1; then
            echo "1Password CLI is not signed in and OP_SERVICE_ACCOUNT_TOKEN is not set."
            exit 1
          fi
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f
      - name: Resolve target GKE environment
        env:
          DEPLOY_ENV: ${{ github.event.inputs.deploy_env }}
        run: |
          set -euo pipefail
          case "$DEPLOY_ENV" in
            staging)
              echo "GKE_ENVIRONMENT=staging" >> "$GITHUB_ENV"
              echo "K8S_NAMESPACE_GKE_TARGET=${K8S_NAMESPACE_GKE_STAGING}" >> "$GITHUB_ENV"
              echo "HELM_RELEASE_GKE_TARGET=${HELM_RELEASE_GKE_STAGING}" >> "$GITHUB_ENV"
              ;;
            prod)
              echo "GKE_ENVIRONMENT=prod" >> "$GITHUB_ENV"
              echo "K8S_NAMESPACE_GKE_TARGET=${K8S_NAMESPACE_GKE_PROD}" >> "$GITHUB_ENV"
              echo "HELM_RELEASE_GKE_TARGET=${HELM_RELEASE_GKE_PROD}" >> "$GITHUB_ENV"
              ;;
            *)
              echo "deploy_env must be staging or prod when deploy_gke=true"
              exit 1
              ;;
          esac
      - name: Get GKE credentials
        env:
          GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
          GKE_LOCATION: ${{ secrets.GKE_LOCATION }}
          GKE_LOCATION_TYPE: ${{ secrets.GKE_LOCATION_TYPE }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          location_flag="--region"
          case "${GKE_LOCATION_TYPE:-region}" in
            zone)
              location_flag="--zone"
              ;;
            region|'')
              location_flag="--region"
              ;;
            *)
              echo "Invalid GKE_LOCATION_TYPE: ${GKE_LOCATION_TYPE}"
              exit 1
              ;;
          esac
          gcloud container clusters get-credentials "$GKE_CLUSTER" "$location_flag" "$GKE_LOCATION" --project "$GCP_PROJECT_ID"
          echo "K8S_CONTEXT_GKE=$(kubectl config current-context)" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Resolve artifact name
        id: artifact
        shell: bash
        env:
          LOCAL_ARTIFACT: ${{ needs.build_images_locally.outputs.artifact_name }}
          CLOUD_ARTIFACT: ${{ needs.build_images_google_cloud.outputs.artifact_name }}
        run: |
          set -euo pipefail
          artifact_name="${LOCAL_ARTIFACT:-$CLOUD_ARTIFACT}"
          if [[ -z "$artifact_name" ]]; then
            echo "Unable to resolve artifact name from build jobs"
            exit 1
          fi
          echo "name=$artifact_name" >> "$GITHUB_OUTPUT"
      - name: Download image artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: deploy/artifacts
      - name: Validate artifact
        run: ./scripts/deploy/ci/verify-artifact.sh "deploy/artifacts/${{ steps.artifact.outputs.name }}"
      - name: Deploy to GKE from release artifact
        env:
          K8S_CONTEXT_GKE: ${{ env.K8S_CONTEXT_GKE }}
          GKE_ENVIRONMENT: ${{ env.GKE_ENVIRONMENT }}
        run: pnpm deploy:k8s:gke "deploy/artifacts/${{ steps.artifact.outputs.name }}"
      - name: Check GKE release status
        env:
          K8S_CONTEXT_GKE: ${{ env.K8S_CONTEXT_GKE }}
          GKE_ENVIRONMENT: ${{ env.GKE_ENVIRONMENT }}
        run: pnpm deploy:k8s:status gke
      - name: Verify OTEL + GKE setup/teardown path
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          RUN_GCP_E2E: '1'
          RUN_GKE_OTEL_DEPLOY_E2E: '1'
          GCP_BILLING_ACCOUNT_ID: ${{ env.GCP_BILLING_ACCOUNT_ID }}
          K8S_NAMESPACE_GKE: ${{ env.K8S_NAMESPACE_GKE_TARGET }}
          HELM_RELEASE_GKE: ${{ env.HELM_RELEASE_GKE_TARGET }}
          K8S_NAMESPACE_GKE_STAGING: ${{ env.K8S_NAMESPACE_GKE_TARGET }}
